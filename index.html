<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #020204;
    color: #a1a1aa;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 2px; }

  #yt-player { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }
  #yt-player iframe { width: 100% !important; height: 100% !important; object-fit: cover; }
  #video-overlay { position: fixed; inset: 0; z-index: 1; background: rgba(0,0,0,0.65); pointer-events: none; display: none; }
  #video-overlay.show { display: block; }
  #goop-container { position: fixed; inset: 0; z-index: 2; display: none; }
  #goop-container.show { display: block; }
  #goop-inner { width: 100%; height: 100%; position: relative; overflow: hidden; background: linear-gradient(to bottom right, #0d0014, #1a0a3e); }
  #goop-inner::before { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.85); z-index: 1; }
  #goop-inner svg { position: absolute; z-index: 2; width: 800px; height: 800px; top: 50%; left: 50%; margin-left: -400px; margin-top: -400px; }
  #goop-inner rect { -webkit-transform-origin: 50% 50%; transform-origin: 50% 50%; }
  #goop-inner .blobs { -webkit-filter: url("#goo"); filter: url("#goo"); }
  #goop-inner .blob { fill: white; }
  #app { background: #020204; }
  #app.video-bg { background: transparent; }
  #app.goop-mode { background: transparent; }

  #app.video-bg #center-art { visibility: hidden; }

  .track-item {
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .track-item:hover { background: rgba(255,255,255,0.04); }
  .track-item.active { background: rgba(168,85,247,0.1); border: 1px solid rgba(168,85,247,0.2); }
  .track-item.playing .track-title { color: #a855f7; }

  .glass { background: rgba(9,9,11,0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.06); }

  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .live-dot { animation: pulse-dot 1.5s ease-in-out infinite; }

  .sidebar { transition: width 0.25s ease; overflow: hidden; }
  .sidebar.collapsed { width: 32px !important; }
  .sidebar.collapsed > .expanded-content { display: none; }
  .sidebar:not(.collapsed) > .collapsed-content { display: none; }
  #controls-sidebar.collapsed .collapsed-shuffle { margin-top: auto; }

  #landing { position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #020204; transition: opacity 0.4s; overflow: hidden; }
  #landing.hidden { opacity: 0; pointer-events: none; }
  #landing-bg { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 2s ease; pointer-events: none; z-index: 2; }
  #landing-bg.show { opacity: 1; }
  .mode-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 24px 0; cursor: pointer; position: relative; z-index: 1; opacity: 0.3; transition: opacity 0.6s ease; }
  .mode-btn:hover { z-index: 3; opacity: 1; }
  .mode-btn.disabled { cursor: default; }
  .mode-btn.disabled:hover { opacity: 0.3; }
  .mode-label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.3em; color: #52525b; }
  .mode-title { font-size: 28px; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: -0.02em; }
  .mode-sub { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em; color: #a855f7; }
  .mode-sub-btn { color: #a1a1aa; text-decoration: none; }
  .mode-sub-btn:hover { color: #fff; }
</style>

<div id="app" style="position:relative;z-index:10;display:flex;flex-direction:column;height:100vh">

<div id="landing">

  <div class="flex flex-col items-center gap-8">
    <div class="mode-btn" onclick="enterPlaylist()">
      <span class="mode-label">Mode</span>
      <span class="mode-title">Playlist</span>
      <span class="mode-sub" style="color:#a1a1aa">Listen</span>

      <span class="mode-label">Mode</span>
      <span class="mode-title">Streams</span>

    </div>
    <div id="radio-btn" class="mode-btn disabled" onclick="enterRadio()">
      <span class="mode-label">Mode</span>
      <span class="mode-title">Radio</span>
      <span id="radio-sub" class="mode-sub">Soon</span>
    </div>
  </div>
</div>

<div class="shrink-0 px-3 h-11 flex items-center justify-between">
  <span onclick="backToLanding()" class="text-xs font-black text-white uppercase italic tracking-tight shrink-0 cursor-pointer">ENDEVER.LIVE</span>
  <div class="flex items-center gap-2 flex-1 justify-center min-w-0 px-3">
    <span id="now-title" class="text-xs font-black text-white uppercase italic tracking-tight truncate">Select a track</span>
  </div>

</div>

<div class="flex-1 flex min-h-0 relative justify-between">
  <!-- Left: Controls -->
  <div id="controls-sidebar" class="sidebar w-48 flex flex-col relative">
    <!-- Collapsed content -->
    <div class="collapsed-content flex flex-col items-center py-2 gap-3">
      <button onclick="toggleControlsSidebar()" class="text-zinc-500 hover:text-white transition-colors p-1" title="Open controls">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <button onclick="prev()" class="text-zinc-600 hover:text-white transition-colors p-1" title="Previous">

      </button>
      <button onclick="togglePlay()" class="text-zinc-600 hover:text-white transition-colors p-1" title="Play/Pause">

      </button>
      <button onclick="next()" class="text-zinc-600 hover:text-white transition-colors p-1" title="Next">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>

    </div>

    <!-- Expanded content -->

      <div class="px-3 py-2.5 shrink-0 flex items-center justify-between">

</div>

</div>

// Load YouTube IFrame API
function loadYTAPI() {
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  const first = document.getElementsByTagName('script')[0];
  first.parentNode.insertBefore(tag, first);
}

function onYouTubeIframeAPIReady() {
  player = new YT.Player('yt-player', {
    height: '100%',
    width: '100%',
    playerVars: { autoplay: 0, controls: 0, disablekb: 1, fs: 0, modestbranding: 1, rel: 0 },
    events: {
      onReady: onPlayerReady,
      onStateChange: onPlayerStateChange,
      onError: onPlayerError
    }
  });
}

function onPlayerReady() {
  ready = true;
}

function onPlayerStateChange(e) {
  if (e.data === YT.PlayerState.PLAYING) { isPlaying = true; updateUI(); startProgress(); }
  else if (e.data === YT.PlayerState.PAUSED) { isPlaying = false; updateUI(); }
  else if (e.data === YT.PlayerState.ENDED) { next(); }
  else if (e.data === YT.PlayerState.CUED) { if (!preventAutoPlay) player.playVideo(); }
}

function onPlayerError(e) {
  console.warn('Player error:', e.data);
  setTimeout(next, 2000);
}

// Queue management
function buildQueue() {
  playQueue = VIDEO_IDS.map((_, i) => i);
  if (shuffle) fisherYates(playQueue);
  queuePos = playQueue.indexOf(currentIndex);
  updateUI();
}

function fisherYates(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function toggleShuffle() {
  shuffle = !shuffle;
  localStorage.setItem('endever_playlist_shuffle', shuffle);
  const currentId = currentIndex >= 0 ? VIDEO_IDS[currentIndex] : null;
  buildQueue();
  // If shuffle turned on, make sure current track stays at queuePos 0 then randomize rest
  if (shuffle && currentId) {
    playQueue = [currentIndex, ...VIDEO_IDS.map((_, i) => i).filter(i => i !== currentIndex)];
    fisherYates(playQueue.slice(1));
    playQueue = [currentIndex, ...fisherYatesInPlace([...playQueue.slice(1)])];
  }
  // If shuffle turned off, rebuild in order
  if (!shuffle) buildQueue();
  syncQueuePos();
  document.querySelectorAll('.shuffle-btn').forEach(el => {
    el.classList.toggle('text-purple-400', shuffle);
  });
  updateUI();
}

function fisherYatesInPlace(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function syncQueuePos() {
  queuePos = playQueue.indexOf(currentIndex);
  if (queuePos === -1 && playQueue.length > 0) { queuePos = 0; currentIndex = playQueue[0]; }
}

function playIndex(idx) {
  if (idx < 0 || idx >= VIDEO_IDS.length) return;
  clearSaying();
  currentIndex = idx;
  syncQueuePos();
  if (ready && player) {
    player.loadVideoById(VIDEO_IDS[idx]);
    isPlaying = true;
    fetchTitle(VIDEO_IDS[idx]);
  }
  updateUI();
  renderPlaylist();
  scrollToCurrent();
  maybeShowSaying();
}

function next() {
  if (playQueue.length === 0) return;
  if (queuePos + 1 >= playQueue.length) {
    const currentIdx = PLAYLISTS.findIndex(p => p.id === currentPlaylistId);
    const nextIdx = (currentIdx + 1) % PLAYLISTS.length;
    switchPlaylist(PLAYLISTS[nextIdx].id);
    return;
  }
  queuePos++;
  playIndex(playQueue[queuePos]);
}

function prev() {
  if (playQueue.length === 0) return;
  // If more than 3 seconds in, restart current track
  if (player && player.getCurrentTime && player.getCurrentTime() > 3) {
    player.seekTo(0);
    return;
  }
  queuePos = (queuePos - 1 + playQueue.length) % playQueue.length;
  playIndex(playQueue[queuePos]);
}

function togglePlay() {
  if (currentIndex < 0 && VIDEO_IDS.length > 0) { playIndex(0); return; }
  if (!player) return;
  if (isPlaying) { player.pauseVideo(); }
  else { player.playVideo(); }
}

// Playlist switching
function renderPlaylistGrid() {
  const grid = document.getElementById('playlist-grid');
  if (!grid) return;
  grid.innerHTML = PLAYLISTS.map((pl, i) => {
    const active = pl.id === currentPlaylistId;
    const img = pl.art ? `<img src="${pl.art}" alt="${pl.name}" class="w-full h-full object-cover rounded-lg">` : `<span class="text-2xl font-black text-zinc-700">${i + 1}</span>`;
    return `<div onclick="switchPlaylist('${pl.id}')" class="aspect-square rounded-lg overflow-hidden cursor-pointer transition-all ${active ? 'ring-2 ring-purple-500' : 'opacity-60 hover:opacity-100'}">${img}</div>`;
  }).join('');
}

function switchPlaylist(id) {
  const pl = PLAYLISTS.find(p => p.id === id);
  if (!pl) return;
  currentPlaylistId = id;
  VIDEO_IDS = pl.ids;
  localStorage.setItem('endever_active_playlist', id);
  renderPlaylistGrid();
  titles = {};
  buildQueue();
  if (ready && player) playIndex(0);
  updateArtDisplay();
}

function updateArtDisplay() {
  const pl = PLAYLISTS.find(p => p.id === currentPlaylistId);
  const img = document.getElementById('art-image');
  const num = document.getElementById('art-number');
  if (pl && pl.centerArt) {
    img.src = pl.centerArt;
    img.classList.remove('hidden');
    num.classList.add('hidden');
  } else {
    img.classList.add('hidden');
    num.classList.remove('hidden');
    if (num) num.textContent = PLAYLISTS.findIndex(p => p.id === currentPlaylistId) + 1;
  }
}

function maybeShowSaying() {
  if (sayingActive) return;
  if (Math.random() > 0.2) return;
  const pool = [...(SAYINGS.common || []), ...(SAYINGS[currentPlaylistId] || [])];
  if (pool.length === 0) return;
  const el = document.getElementById('saying-text');
  if (el) {
    el.textContent = pool[Math.floor(Math.random() * pool.length)];
    sayingActive = true;
  }
}

function clearSaying() {
  if (!sayingActive) return;
  const el = document.getElementById('saying-text');
  if (el) el.textContent = '';
  sayingActive = false;
}

// UI
function updateUI() {
  const html = isPlaying
    ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
    : '<polygon points="5 3 19 12 5 21 5 3"/>';
  const big = document.getElementById('play-icon');
  const sm = document.getElementById('play-icon-sm');
  if (big) big.innerHTML = html;
  if (sm) sm.innerHTML = html;

  document.querySelectorAll('.shuffle-btn').forEach(el => {
    el.classList.toggle('text-purple-400', shuffle);
  });
}

function startProgress() {
  function tick() {
    if (!player || !isPlaying) return;
    const dur = player.getDuration();
    const cur = player.getCurrentTime();
    if (dur > 0) {
      document.getElementById('progress-bar').style.width = `${(cur / dur) * 100}%`;
      const m = Math.floor(cur / 60);
      const s = Math.floor(cur % 60);
      document.getElementById('time-display').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// Titles
async function fetchTitle(videoId) {
  if (titles[videoId]) { updateNowPlaying(videoId, titles[videoId]); return; }
  try {
    const res = await fetch(`https://www.youtube.com/oembed?url=https://youtu.be/${videoId}&format=json`);
    const data = await res.json();
    titles[videoId] = data.title;
    updateNowPlaying(videoId, data.title);
    renderPlaylist();
  } catch {
    updateNowPlaying(videoId, videoId);
  }
}

function updateNowPlaying(videoId, title) {
  document.getElementById('now-title').textContent = title || videoId;
  const btn = document.getElementById('go-sub-btn');
  if (btn) btn.href = `https://youtu.be/${videoId}`;
}

// Playlist rendering
function renderPlaylist() {
  const container = document.getElementById('playlist');
  if (!container) return;
  container.innerHTML = VIDEO_IDS.map((id, i) => {
    const isCurrent = i === currentIndex;
    const title = titles[id] || id;
    return `<div class="track-item ${isCurrent ? 'active playing' : ''}" onclick="playIndex(${i})">
      <span class="text-[9px] font-mono text-zinc-600 w-5 shrink-0 text-right">${i + 1}</span>
      <span class="text-[10px] font-mono ${isCurrent ? 'text-purple-400' : 'text-zinc-300'} truncate flex-1 track-title">${title}</span>
      ${isCurrent && isPlaying ? '<span class="w-1.5 h-1.5 rounded-full bg-purple-500 live-dot shrink-0"></span>' : ''}
    </div>`;
  }).join('');
}

function scrollToCurrent() {
  const container = document.getElementById('playlist');
  if (!container) return;
  const active = container.querySelector('.active');
  if (active) active.scrollIntoView({ block: 'center', behavior: 'smooth' });
}

function togglePlaylistSidebar() {
  document.getElementById('playlist-sidebar').classList.toggle('collapsed');
}

function toggleControlsSidebar() {
  document.getElementById('controls-sidebar').classList.toggle('collapsed');
}

let videoBg = false;
let goopTween = null;
function toggleVideoBg() {
  videoBg = !videoBg;
  const app = document.getElementById('app');
  const overlay = document.getElementById('video-overlay');
  const btn = document.getElementById('btn-video-bg');
  const goop = document.getElementById('goop-container');
  app.classList.toggle('video-bg', videoBg);
  app.classList.toggle('goop-mode', !videoBg);
  overlay.classList.toggle('show', videoBg);
  goop.classList.toggle('show', !videoBg);
  if (!videoBg) {
    if (goopTween) goopTween.kill();
    goopTween = TweenMax.staggerFromTo('#goop-inner .blob', 4, {
      cycle: {
        attr: function(i) {
          var r = i*90;
          return { transform:'rotate('+r+') translate(8,0.1) rotate('+(-r)+')' }
        }
      }
    }, {
      cycle: {
        attr: function(i) {
          var r = i*90+360;
          return { transform:'rotate('+r+') translate(8,0.1) rotate('+(-r)+')' }
        }
      },
      ease:Linear.easeNone,
      repeat:-1
    });
  } else {
    if (goopTween) { goopTween.kill(); goopTween = null; }
  }
  btn.classList.toggle('text-purple-400', videoBg);
}

// Volume
function initVolume() {
  const saved = localStorage.getItem('endever_playlist_volume');
  const val = saved !== null ? Math.max(0, Math.min(100, parseInt(saved))) : 50;
  const slider = document.getElementById('volume-slider');
  const fill = document.getElementById('volume-fill');
  const label = document.getElementById('volume-label');
  slider.value = val;
  if (fill) fill.style.width = val + '%';
  if (label) label.textContent = val + '%';
  slider.addEventListener('input', () => {
    const v = parseInt(slider.value);
    if (fill) fill.style.width = v + '%';
    if (label) label.textContent = v + '%';
    if (player && player.setVolume) player.setVolume(v);
    localStorage.setItem('endever_playlist_volume', v);
  });
}

function applyVolume() {
  const val = parseInt(document.getElementById('volume-slider').value);
  if (player && player.setVolume) player.setVolume(val);
}

// Patch onPlayerReady
const _origOnReady = onPlayerReady;
onPlayerReady = function() {
  ready = true;
  buildQueue();
  applyVolume();
  if (VIDEO_IDS.length > 0) playIndex(0);
};

function enterPlaylist() {
  preventAutoPlay = false;
  buildQueue();
  if (VIDEO_IDS.length > 0) playIndex(0);
  document.getElementById('landing-bg').src = '';
  document.getElementById('landing').classList.add('hidden');
  if (!videoBg) {
    document.getElementById('app').classList.add('goop-mode');
    document.getElementById('goop-container').classList.add('show');
    if (goopTween) goopTween.kill();
    goopTween = TweenMax.staggerFromTo('#goop-inner .blob', 4, {
      cycle: {
        attr: function(i) {
          var r = i*90;
          return { transform:'rotate('+r+') translate(8,0.1) rotate('+(-r)+')' }
        }
      }
    }, {
      cycle: {
        attr: function(i) {
          var r = i*90+360;
          return { transform:'rotate('+r+') translate(8,0.1) rotate('+(-r)+')' }
        }
      },
      ease:Linear.easeNone,
      repeat:-1
    });
  }
}

let preventAutoPlay = false;

function backToLanding() {
  preventAutoPlay = true;
  if (player && player.stopVideo) player.stopVideo();
  stopRadio();
  isPlaying = false;
  currentIndex = -1;
  document.getElementById('goop-container').classList.remove('show');
  document.getElementById('app').classList.remove('goop-mode');
  if (goopTween) { goopTween.kill(); goopTween = null; }
  document.getElementById('landing').classList.remove('hidden');
  showLandingBg();
  document.getElementById('now-title').textContent = 'Select a track';
  updateUI();
  renderPlaylist();
}

function enterRadio() {
  const btn = document.getElementById('radio-btn');
  if (btn.classList.contains('disabled')) return;
  document.getElementById('landing-bg').src = '';
  document.getElementById('goop-container').classList.remove('show');
  document.getElementById('app').classList.remove('goop-mode');
  if (goopTween) { goopTween.kill(); goopTween = null; }
  document.getElementById('landing').classList.add('hidden');
  const audio = document.getElementById('radio-audio');
  audio.src = `${getApiUrl()}/stream.mp3`;
  audio.volume = parseInt(document.getElementById('volume-slider').value) / 100;
  audio.play();
  document.getElementById('now-title').textContent = 'Radio — connecting...';
  pollRadioStatus();
}

let radioPoll = null;
async function pollRadioStatus() {
  try {
    const res = await fetch(`${getApiUrl()}/api/status`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    if (data.current) {
      document.getElementById('now-title').textContent = data.current.title || 'Radio';
    }
  } catch {}
  radioPoll = setTimeout(pollRadioStatus, 3000);
}

function stopRadio() {
  const audio = document.getElementById('radio-audio');
  audio.pause();
  audio.src = '';
  if (radioPoll) { clearTimeout(radioPoll); radioPoll = null; }
}

function backToLanding() {
  if (player && player.pauseVideo) { player.pauseVideo(); player.cueVideoById(''); }
  stopRadio();
  isPlaying = false;
  currentIndex = -1;
  document.getElementById('landing').classList.remove('hidden');
  document.getElementById('now-title').textContent = 'Select a track';
  updateUI();
  renderPlaylist();
}

function getApiUrl() {
  return localStorage.getItem('endever_api_url') || 'http://localhost:5000';
}

async function checkRadioApi() {
  try {
    const res = await fetch(`${getApiUrl()}/api/status`);
    if (!res.ok) throw new Error();
    const btn = document.getElementById('radio-btn');
    btn.classList.remove('disabled');
    document.getElementById('radio-sub').textContent = 'Listen';
  } catch {}
}

let bgTimer = null;
function showLandingBg() {
  const bg = document.getElementById('landing-bg');
  bg.classList.remove('show');
  bg.src = 'https://my.spline.design/unchained-d3hHCgdWho7a8ATGzKtB11TU';
  if (bgTimer) clearTimeout(bgTimer);
  bgTimer = setTimeout(() => bg.classList.add('show'), 5000);
}

// Init
const savedPlaylist = localStorage.getItem('endever_active_playlist');
if (savedPlaylist) {
  const pl = PLAYLISTS.find(p => p.id === savedPlaylist);
  if (pl) { currentPlaylistId = pl.id; VIDEO_IDS = pl.ids; }
}
const savedShuffle = localStorage.getItem('endever_playlist_shuffle');
if (savedShuffle === 'true') {
  shuffle = true;
  document.querySelectorAll('.shuffle-btn').forEach(el => el.classList.add('text-purple-400'));
}
renderPlaylistGrid();
updateArtDisplay();
initVolume();
loadYTAPI();
checkRadioApi();
showLandingBg();
</script>
</body>
</html>
